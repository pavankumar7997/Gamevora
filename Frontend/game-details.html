<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Game Details | Gamevora</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>
    <a href="index.html" class="back-btn">⬅ Back to Home</a>
    <div class="game-details">
    <div class="game-banner">

        <img id="gameBanner" src="images/chess.jpg" alt="Banner">
        <div class="gallery">

            <img src="images/chess.jpg">

            <img src="images/chess2.jpg">

            <img src="images/chess3.jpg">

        </div>

    </div>
    <img id="gameImage" src="images/chess.jpg" alt="Game">

    <div class="game-info">

        <h1 id="gameTitle">Chess</h1>

        <p>⭐⭐⭐⭐⭐ <span id="gameRating">4.9</span></p>

        <p><b>Players:</b> <span id="gamePlayers">2</span></p>

        <p><b>Difficulty:</b> <span id="gameDifficulty">Hard</span></p>

        <p><b>Category:</b> <span id="gameCategory">Strategy</span></p>

        <p id="gameDescription">
            Improve your strategy by playing chess against friends or AI.
        </p>
        <p><b>Release:</b> 2026</p>

        <p><b>Controls:</b> Mouse / Keyboard</p>

        <p><b>Mode:</b> Single Player</p>
        <a id="playGameBtn" href="games/chess.html" class="btn">
            ▶ Play Now
         </a>

        </div>

    </div>

    <script src="js/game-details.js"></script>

    <h1>🎮 Game Details</h1>

</body>

</html>
